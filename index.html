<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #222831;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #3b6ea8;
      --accent-dark: #28527f;
      --correct-bg: #e8f5ed;
      --correct: #166534;
      --wrong-bg: #fdecec;
      --wrong: #991b1b;
      --neutral-bg: #eef2f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #1f3f5f, #3b6ea8);
      color: white;
      padding: 32px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: -0.04em;
    }

    header p {
      margin: 0;
      color: rgba(255,255,255,.86);
      font-size: 0.98rem;
    }

    main {
      max-width: 960px;
      margin: 24px auto 60px;
      padding: 0 16px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .scorebox {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .scorebox strong { color: var(--text); }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: transform .08s ease, background .12s ease;
    }

    button:hover { background: var(--accent-dark); }
    button:active { transform: translateY(1px); }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .secondary:hover { background: #d1d5db; }

    .question-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin: 16px 0;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
    }

    .qtop {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }

    .qnum {
      color: var(--accent-dark);
      font-weight: 800;
      font-size: 0.95rem;
    }

    .lawtag {
      background: var(--neutral-bg);
      color: #334155;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .question {
      font-size: 1.08rem;
      font-weight: 750;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
    }

    .options {
      display: grid;
      gap: 8px;
    }

    .option {
      width: 100%;
      text-align: left;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-weight: 600;
    }

    .option:hover { background: #f8fafc; }
    .option.correct {
      background: var(--correct-bg);
      border-color: #86efac;
      color: var(--correct);
    }
    .option.wrong {
      background: var(--wrong-bg);
      border-color: #fca5a5;
      color: var(--wrong);
    }
    .option:disabled { cursor: default; opacity: 1; }

    .feedback {
      display: none;
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 12px;
      border-left: 5px solid;
      background: #f8fafc;
    }

    .feedback.show { display: block; }
    .feedback.correct { border-color: var(--correct); background: var(--correct-bg); }
    .feedback.wrong { border-color: var(--wrong); background: var(--wrong-bg); }

    .feedback-title {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .explain {
      margin: 4px 0 6px;
    }

    .ref {
      color: #344054;
      font-size: 0.92rem;
      font-weight: 650;
    }

    .result {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      display: none;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
    }

    .result.show { display: block; }
    .result h2 { margin: 0 0 8px; }

    footer {
      max-width: 960px;
      margin: 0 auto 30px;
      padding: 0 16px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    @media (max-width: 640px) {
      .toolbar { position: static; }
      .qtop { flex-direction: column; gap: 4px; }
      .lawtag { white-space: normal; }
    }
  </style>
</head>

    let answered = Array(questions.length).fill(false);
    let correct = Array(questions.length).fill(false);

    function renderQuiz() {
      const quiz = document.getElementById('quiz');
      quiz.innerHTML = questions.map((item, idx) => `
        <article class="question-card" id="q${idx}">
          <div class="qtop">
            <div class="qnum">문항 ${idx + 1}</div>
            <div class="lawtag">${item.source}</div>
          </div>
          <p class="question">${escapeHtml(item.q)}</p>
          <div class="options">
            ${item.options.map((opt, optIdx) => `
              <button class="option" id="q${idx}o${optIdx}" onclick="checkAnswer(${idx}, ${optIdx})">${optIdx + 1}. ${escapeHtml(opt)}</button>
            `).join('')}
          </div>
          <div class="feedback" id="fb${idx}"></div>
        </article>
      `).join('');
    }

    function checkAnswer(qIdx, selectedIdx) {
      if (answered[qIdx]) return;

      const item = questions[qIdx];
      answered[qIdx] = true;
      const isCorrect = selectedIdx === item.answer;
      correct[qIdx] = isCorrect;

      item.options.forEach((_, optIdx) => {
        const btn = document.getElementById(`q${qIdx}o${optIdx}`);
        btn.disabled = true;
        if (optIdx === item.answer) btn.classList.add('correct');
        if (optIdx === selectedIdx && !isCorrect) btn.classList.add('wrong');
      });

      const fb = document.getElementById(`fb${qIdx}`);
      fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
      fb.innerHTML = `
        <div class="feedback-title">${isCorrect ? '정답입니다.' : '오답입니다.'}</div>
        <div class="explain">정답: <strong>${item.answer + 1}. ${escapeHtml(item.options[item.answer])}</strong></div>
        <div class="ref">관련 법령: ${escapeHtml(item.source)}</div>
      `;

      updateScore();
    }

    function updateScore() {
      const answeredCount = answered.filter(Boolean).length;
      const correctCount = correct.filter(Boolean).length;
      const accuracy = answeredCount ? Math.round((correctCount / answeredCount) * 100) : 0;
      document.getElementById('answeredCount').textContent = answeredCount;
      document.getElementById('correctCount').textContent = correctCount;
      document.getElementById('accuracy').textContent = `${accuracy}%`;

      if (answeredCount === questions.length) {
        const finalAccuracy = Math.round((correctCount / questions.length) * 100);
        const result = document.getElementById('result');
        result.classList.add('show');
        document.getElementById('resultText').innerHTML = `총 <strong>${questions.length}</strong>문항 중 <strong>${correctCount}</strong>문항 정답입니다. 최종 정답률은 <strong>${finalAccuracy}%</strong>입니다.`;
        result.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function resetQuiz() {
      answered = Array(questions.length).fill(false);
      correct = Array(questions.length).fill(false);
      document.getElementById('result').classList.remove('show');
      renderQuiz();
      updateScore();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    renderQuiz();
    updateScore();
  </script>
